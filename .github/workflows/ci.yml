name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build -o bin/splash ./

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
